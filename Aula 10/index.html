<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }

        #Notas { 
            border: 5px solid grey; 
            width: 400px; 
            min-height: 500px; 
            background-color: white; 
            text-align: center; 
            padding: 10px; 
        }

        .form-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .card { 
            border: 1px solid rgb(14, 233, 87); 
            margin: 20px; 
            padding: 20px; 
            border-radius: 5px; 
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            width: 25px;
            height: 25px;
        }

        .like-btn {
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
            border: none;
            background-color: #ddd;
            border-radius: 5px;
        }

        .like-btn:hover {
            background-color: #bbb;
        }

        .dark { background-color: #333; color: white; }
        .céu { background-color: #87CEEB; color: black; }
        .neon { box-shadow: 0 0 10px #39FF14; color: black; }
    </style>
</head>
<body>

<div id="Notas">
    <h1>Preview de Perfil</h1>
    <hr>

    <div class="form-container">
        <div>Nome: <input type="text" id="titulo" placeholder="Nome.."></div>
        <div>User: <input type="text" id="Conteudo" placeholder="@...."></div>
        
        <select id="corFundo">
            <option value="dark">Dark</option>
            <option value="céu">Céu</option>
            <option value="neon">Neon</option>
        </select>

        <button onclick="criarCard()">Criar Card</button>
    </div>

    <hr>
    <h2>Minhas Notas</h2>
    <div id="card-container"></div>
</div>

<script>

function criarCard() {
    let titulo = document.getElementById("titulo").value;
    let descricao = document.getElementById("Conteudo").value;
    let cor = document.getElementById("corFundo").value;

    if (titulo == "") { 
        alert("Digite um nome!"); 
        return; 
    }

    let card = document.createElement("div");
    card.className = "card " + cor;

    card.innerHTML = `
        <button class="delete-btn">X</button>
        <h3>${titulo}</h3>
        <p>${descricao}</p>
        <button class="like-btn">👍 <span class="like-count">0</span></button>
    `;

    // deletar
    let deleteBtn = card.querySelector(".delete-btn");
    deleteBtn.onclick = function() {
        card.remove();
    };

    // curtida
    let likeBtn = card.querySelector(".like-btn");
    let likeCount = card.querySelector(".like-count");

    let curtidas = 0;

    likeBtn.onclick = function() {
        curtidas++;
        likeCount.textContent = curtidas;
    };

    document.getElementById("card-container").appendChild(card);

    document.getElementById("titulo").value = "";
    document.getElementById("Conteudo").value = "";
}

</script>

</body>
</html>
