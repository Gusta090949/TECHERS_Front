<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Notas RPG</title>

<style>


</style>
</head>

<body>

<div id="Notas">

    <h1>Preview de Perfil</h1>

    <hr>

    <div class="form-container">

        <div>
            Nome:
            <input type="text" id="titulo" placeholder="Nome do item">
        </div>

        <div>
            User:
            <input type="text" id="Conteudo" placeholder="Descrição">
        </div>

        <select id="corFundo">

            <option value="dark">
                Poção de Vida
            </option>

            <option value="ceu">
                Poção de Força
            </option>

            <option value="neon">
                Poção de Invisibilidade
            </option>

        </select>

        <button onclick="criarCard()">
            Criar Card
        </button>

    </div>

    <hr>

    <h2>Meus Itens</h2>

    <div id="card-container"></div>

</div>

<script>

function criarCard(){

    let titulo = document.getElementById("titulo").value;

    let descricao = document.getElementById("Conteudo").value;

    let select = document.getElementById("corFundo");

    let cor = select.value;

    let textoOpcao =
        select.options[select.selectedIndex].text;

    // validação

    if(titulo.trim() === ""){

        alert("Digite um nome!");

        return;
    }

    // cria card

    let card = document.createElement("div");

    // verifica se é lendário

    const eLendario =

        titulo.toLowerCase().includes("lendario") ||

        descricao.toLowerCase().includes("lendario");

    // adiciona classes

    if(eLendario){

        card.className =
            "card " + cor + " item-lendario";

    }else{

        card.className =
            "card " + cor;
    }

    // conteúdo do card

    card.innerHTML = `

        <button class="delete-btn">
            X
        </button>

        <h3>${titulo}</h3>

        <p>${descricao}</p>

        <p>
            <strong>Poção escolhida:</strong>
            ${textoOpcao}
        </p>

        <button class="like-btn">

            👍 <span class="like-count">0</span>

        </button>
    `;

    // mensagem lendária

    if(eLendario){

        card.innerHTML += `

            <p>
                ⭐ ITEM LENDÁRIO ⭐
            </p>

        `;
    }

    // botão deletar

    let deleteBtn =
        card.querySelector(".delete-btn");

    deleteBtn.onclick = function(){

        card.remove();
    };

    card.addEventListener("mouseover", function(){

deleteBtn.style.opacity = "1";
});

card.addEventListener("mouseout", function(){

deleteBtn.style.opacity = "0";
});

    // sistema de curtidas

    let likeBtn =
        card.querySelector(".like-btn");

    let likeCount =
        card.querySelector(".like-count");

    let curtidas = 0;

    likeBtn.onclick = function(){

        curtidas++;

        likeCount.textContent = curtidas;
    };

    // adiciona card

    document
        .getElementById("card-container")
        .appendChild(card);

    // limpa campos

    document.getElementById("titulo").value = "";

    document.getElementById("Conteudo").value = "";
}

</script>

</body>
</html>
