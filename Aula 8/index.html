<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Escolher Cor de Fundo</title>
    <style>
        body {
            transition: background-color 0.3s ease; /* Transição suave */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <label for="corFundo">Escolha a cor de fundo: </label>
        <input type="color" id="corFundo" value="#ffffff">
    </div>

    <script>
        const inputCor = document.getElementById('corFundo');
        
        // Adiciona evento para mudar a cor em tempo real
        inputCor.addEventListener('input', function() {
            document.body.style.backgroundColor = inputCor.value;
        });
    </script>
       <p>Escreva seu nome</p>
       <input type="" name="" id="">
</body>
</html>
